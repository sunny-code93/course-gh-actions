name: upper-build

on:
    push:
        paths:
        - ".github/workflows/upper-build.yml"
        - "upper/**"
    workflow_dispatch: # manual trigger

jobs:
    build:
        name: Build upper
        runs-on: ubuntu-latest
        steps:
            - run: pwd && ls -la
            - uses: actions/checkout@v4
            - run: pwd && ls -la