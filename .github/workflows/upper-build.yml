name: upper-build

on:
    push:
        paths:
        - ".github/workflows/upper-build.yml"
        - "upper/**"
    workflow_dispatch: # manual trigger

jobs:
    build:
        name: Build upper
        runs-on: ubuntu-latest
        steps:
            - run: go version
            - uses: actions/setup-go@v5
              with:
                  go-version: '1.22'
            - run: go version